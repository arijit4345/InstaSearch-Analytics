<script>
  (function () {
    try {
      // Check if they previously saved a theme preference
      var saved = localStorage.getItem("pulse-index-theme");
      
      // If not, explicitly default to "light" instead of checking OS settings
      var theme = saved || "light";
      
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {}
  })();
</script>
