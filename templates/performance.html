<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Analysis</title>
    {% include '_theme_init.html' %}
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    {% include '_topbar.html' %}

    <div class="page-head">
      <span class="eyebrow">linear vs hashmap</span>
      <h1>Performance Analysis</h1>
      <p>
        Search-time comparison for the active dataset, measured in the same run.
      </p>
    </div>

    <main>
      <div class="stat-grid">
        <div class="stat-card c-coral">
          <div class="stat-icon"></div>
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="12" x2="20" y2="12" />
            <circle
              cx="8"
              cy="12"
              r="1.3"
              style="fill: currentColor; stroke: none"
            />
            <circle
              cx="14"
              cy="12"
              r="1.3"
              style="fill: currentColor; stroke: none"
            />
            <circle
              cx="19"
              cy="12"
              r="1.3"
              style="fill: currentColor; stroke: none"
            />
          </svg>
          <div class="stat-label">Linear search time</div>
          <div class="stat-value">{{ result.linear_time }}</div>
        </div>

        <div class="stat-card c-mint">
          <div class="stat-icon"></div>
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="7" height="7" rx="1.3" />
            <rect x="13" y="4" width="7" height="7" rx="1.3" />
            <rect x="4" y="13" width="7" height="7" rx="1.3" />
            <rect x="13" y="13" width="7" height="7" rx="1.3" />
          </svg>
          <div class="stat-label">HashMap search time</div>
          <div class="stat-value">{{ result.hash_time }}</div>
        </div>
      </div>

      <div class="chart-card">
        <canvas id="performanceChart" height="110"></canvas>
      </div>

      <a class="back-link" href="/">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="11,6 5,12 11,18" />
        </svg>
        Back to home
      </a>
    </main>

    <script>
      function chartColors() {
        var dark =
          document.documentElement.getAttribute("data-theme") === "dark";
        return {
          grid: dark ? "#2b3540" : "#d9e0dd",
          tick: dark ? "#93a0aa" : "#5c6670",
          bars: [dark ? "#ff7c6c" : "#ff5a48", dark ? "#2fd9ae" : "#19a982"],
        };
      }

      var c = chartColors();
      var ctx = document.getElementById("performanceChart");

      var perfChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Linear Search", "HashMap Search"],
          datasets: [
            {
              label: "Execution Time",
              data: [
                Number("{{ result.linear_time }}"),
                Number("{{ result.hash_time }}"),
              ],
              backgroundColor: c.bars,
              borderRadius: 6,
              maxBarThickness: 70,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: c.tick }, grid: { display: false } },
            y: { ticks: { color: c.tick }, grid: { color: c.grid } },
          },
        },
      });

      window.addEventListener("pulse-theme-change", function () {
        var nc = chartColors();
        perfChart.data.datasets[0].backgroundColor = nc.bars;
        perfChart.options.scales.x.ticks.color = nc.tick;
        perfChart.options.scales.y.ticks.color = nc.tick;
        perfChart.options.scales.y.grid.color = nc.grid;
        perfChart.update();
      });
    </script>

    <script src="{{ url_for('static', filename='theme.js') }}" defer></script>
  </body>
</html>
