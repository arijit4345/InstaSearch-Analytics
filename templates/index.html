<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Content Discovery</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Instagram Content Discovery System</h1>

        <!-- Upload Dataset -->

        <div class="card">

            <h2>Upload Dataset</h2>

            <form action="/upload"
                  method="POST"
                  enctype="multipart/form-data">

                <input type="file"
                       name="dataset"
                       accept=".txt"
                       required>

                <button type="submit">
                    Upload File
                </button>

            </form>

        </div>

        <!-- Search -->

        <div class="card">

            <h2>Search Posts</h2>

            <form action="/search"
                  method="POST">

                <input type="text"
                       name="keyword"
                       placeholder="Enter keyword, hashtag, creator..."
                       required>

                <button type="submit">
                    Search
                </button>

            </form>

        </div>

        <!-- Filters -->

        <div class="card">

            <h2>Filter Posts</h2>

            <select id="filterSelect">

                <option value="">
                    Select Filter
                </option>

                <option value="/sort/likes">
                    Popularity (Likes)
                </option>

                <option value="/sort/engagement">
                    Engagement
                </option>

                <option value="/recent">
                    Recent Posts
                </option>

            </select>

            <button type="button"
                    onclick="goToFilter()">
                See Posts
            </button>

        </div>

        <!-- Quick Access -->

        <div class="card">

            <h2>Analytics Dashboard</h2>

            <div class="nav-buttons">

                <a href="/trending">
                    <button>
                        Trending Hashtags
                    </button>
                </a>

                <a href="/creators">
                    <button>
                        Popular Creators
                    </button>
                </a>

                <a href="/statistics">
                    <button>
                        Statistics Dashboard
                    </button>
                </a>

                <a href="/performance">
                    <button>
                        Performance Analysis
                    </button>
                </a>

            </div>

        </div>

    </div>

    <script>

        function goToFilter() {

            const selected =
                document.getElementById(
                    "filterSelect"
                ).value;

            if (selected !== "") {

                window.location.href =
                    selected;

            }
            else {

                alert(
                    "Please select a filter first."
                );

            }
        }

    </script>

</body>

</html>
